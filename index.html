<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08101B" />
    <link rel="icon" type="image/png" href="/logo.png" />

    <title>My Wellbeing Healthcare & Tourism · Luxury Travel & Wellness</title>
    <meta
      name="description"
      content="Bespoke luxury holidays, wellness & yoga retreats, and coordinated health & medical tourism in India and Asia. Managed by NHS Doctor Dr. Vinesh Narayan (Vini) and travel specialist Nimish."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="My Wellbeing Healthcare & Tourism · Bespoke Luxury Travel & Wellness" />
    <meta
      property="og:description"
      content="Plan luxury travel, holistic yoga/meditation retreats, and coordinated medical travel to India and Asia in partnership with Blue Spice Holidays."
    />
    <meta property="og:image" content="/desktop_hero_fallback.webp" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "My Wellbeing Healthcare & Tourism",
        "alternateName": "My Wellbeing Healthcare",
        "description": "Bespoke luxury holidays, wellness & yoga retreats, and coordinated health & medical tourism in India and Asia, operated in partnership with Blue Spice Holidays.",
        "url": "https://mywellbeinghealthcare.co.uk",
        "logo": "https://mywellbeinghealthcare.co.uk/logo-gray.webp",
        "slogan": "Comfort, Confidence, and Care.",
        "founder": [
          {
            "@type": "Person",
            "name": "Dr. Vinesh Narayan",
            "jobTitle": "NHS Doctor & Co-Founder",
            "description": "NHS Doctor with 20 years of clinical experience, coordinating medical tourism, Ayurvedic healing, and wellness travel in Asia."
          },
          {
            "@type": "Person",
            "name": "Nimish",
            "jobTitle": "Travel Specialist & Co-Founder",
            "description": "Founder of Blue Spice Travels Ltd (since 2009), arranging luxury, bespoke travel, and health tourism in Kerala and across Asia."
          }
        ],
        "partner": {
          "@type": "TravelAgency",
          "name": "Blue Spice Holidays",
          "alternateName": "Blue Spice Travels Ltd",
          "description": "Trusted travel partner in India providing deep local insights, bespoke planned itineraries, and seamless on-ground logistical support."
        },
        "areaServed": [
          { "@type": "AdministrativeArea", "name": "India" },
          { "@type": "AdministrativeArea", "name": "Kerala" },
          { "@type": "AdministrativeArea", "name": "Himalayas" },
          { "@type": "AdministrativeArea", "name": "Asia" }
        ],
        "offers": {
          "@type": "Offer",
          "name": "Summer 2026 Early Booking Offer",
          "description": "Book your holiday during our Summer 2026 Early Booking Promotion and receive 10% off selected tour packages.",
          "priceCurrency": "GBP",
          "price": "Varies"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
