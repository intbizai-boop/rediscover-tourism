  --color-gold: #00a2ff;
  --color-sunset-gold: #0077ff;
  --color-deep-amber: #0c1a30;
  --color-glass: rgba(255, 255, 255, 0.45);
  --color-hairline: rgba(255, 255, 255, 0.6);
}

html {
  background-color: #08101b;
  -webkit-tap-highlight-color: transparent;
}

html.light-sky-theme {
  background-color: #00b0ff;
}

body {
  background-color: var(--color-ink, #08101B);
  font-family: Inter, system-ui, -apple-system, sans-serif;
  color: var(--color-cream, #F7F4EF);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

::-moz-selection {
  background: #d4af37;
  color: #08101b;
}

::selection {
  background: #d4af37;
  color: #08101b;
}

body.light-sky-theme ::-moz-selection {
  background: #ffffff;
  color: #00b0ff;
}

body.light-sky-theme ::selection {
  background: #ffffff;
  color: #00b0ff;
}

/* ==========================================================================
   Light Sky Theme Custom Component Overrides (TrailiFornia Right Side Theme)
   ========================================================================== */

/* Elegant soft shadow for cards (floating on vibrant sky blue canvas) */
.light-sky-theme .shadow-glass {
  box-shadow: 0 10px 30px -10px rgba(12, 26, 48, 0.08), 
              0 1px 1px rgba(255, 255, 255, 0.1),
              inset 0 0 0 1.5px rgba(255, 255, 255, 0.6) !important;
  backdrop-filter: blur(16px) !important;
  -webkit-backdrop-filter: blur(16px) !important;
}

/* CTA button styling */
.light-sky-theme a.inline-flex,
.light-sky-theme button {
  box-shadow: 0 4px 14px 0 rgba(12, 26, 48, 0.1);
}

/* Primary CTA Button Overrides (Solid White with Navy Text, matching blue bg CTAs) */
.light-sky-theme a.bg-gold,
.light-sky-theme button.bg-gold {
  background-color: #ffffff !important;
  color: #0c1a30 !important;
}

.light-sky-theme a.bg-gold:hover,
.light-sky-theme button.bg-gold:hover {
  background-color: #f0f7ff !important;
  color: #0077ff !important;
}

/* Secondary CTA Button Overrides (Transparent white-glass with white border) */
.light-sky-theme a.border-hairline,
.light-sky-theme button.border-hairline {
  border-color: rgba(255, 255, 255, 0.6) !important;
  color: #0c1a30 !important;
  background-color: rgba(255, 255, 255, 0.25) !important;
}

.light-sky-theme a.border-hairline:hover,
.light-sky-theme button.border-hairline:hover {
  background-color: rgba(255, 255, 255, 0.45) !important;
  color: #0077ff !important;
  border-color: #ffffff !important;
}

/* Form Inputs & Textareas Override (Soft translucent white-glass inputs) */
.light-sky-theme input,
.light-sky-theme textarea {
  background-color: rgba(255, 255, 255, 0.3) !important;
  border-color: rgba(255, 255, 255, 0.5) !important;
  color: #0c1a30 !important;
}

.light-sky-theme input:focus,
.light-sky-theme textarea:focus {
  background-color: rgba(255, 255, 255, 0.5) !important;
  border-color: #ffffff !important;
}

.light-sky-theme input::-moz-placeholder, .light-sky-theme textarea::-moz-placeholder {
  color: rgba(12, 26, 48, 0.5) !important;
}

.light-sky-theme input::placeholder,
.light-sky-theme textarea::placeholder {
  color: rgba(12, 26, 48, 0.5) !important;
}

/* Icon containers in cards (Why chooses cards and Journey cards) */
.light-sky-theme .rounded-full:has(svg),
.light-sky-theme .rounded-2xl:has(svg) {
  background-color: rgba(255, 255, 255, 0.75) !important;
  color: #0077ff !important;
  border-color: rgba(255, 255, 255, 0.9) !important;
}

/* Mobile Hamburger Menu button */
.light-sky-theme button[aria-controls="mobile-menu"] {
  color: #1e293b !important;
  border-color: rgba(255, 255, 255, 0.6) !important;
  background-color: rgba(255, 255, 255, 0.4) !important;
}

/* Mobile Menu Panel */
.light-sky-theme #mobile-menu {
  background-color: #00b0ff !important;
}

.light-sky-theme #mobile-menu nav a {
  color: #0c1a30 !important;
}

.light-sky-theme #mobile-menu nav a:hover {
  color: #ffffff !important;
}

/* Contact Form Button Text Override */
.light-sky-theme .bg-sunset-gradient {
  color: #ffffff !important;
}

.light-sky-theme .bg-sunset-gradient svg {
  color: #ffffff !important;
}

/* Ambient Music soundwave bars */
.light-sky-theme .bg-sunset-gold {
  background-color: #0077ff !important;
}

/* Final CTA Section Overrides (Gold-to-Blue Highlight block) */
.light-sky-theme .bg-sunset-gradient {
  background: linear-gradient(135deg, #00a2ff 0%, #0077ff 100%) !important;
}

.light-sky-theme .bg-sunset-gradient + div {
  background: transparent !important; /* Remove the dark gradient overlay */
}

.light-sky-theme section:has(.bg-sunset-gradient) .text-ink {
  color: #ffffff !important;
}

.light-sky-theme section:has(.bg-sunset-gradient) .text-ink\/90 {
  color: rgba(255, 255, 255, 0.95) !important;
}

.light-sky-theme section:has(.bg-sunset-gradient) .text-ink\/75 {
  color: rgba(255, 255, 255, 0.78) !important;
}

.light-sky-theme section:has(.bg-sunset-gradient) .font-mono {
  color: rgba(255, 255, 255, 0.85) !important;
}

/* Honor reduced-motion globally as a safety net for CSS transitions. */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.001ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.001ms !important;
    scroll-behavior: auto !important;
  }
}

/* Subtle film grain / vignette helper for cinematic sections. */
.cinematic-overlay {
  background: radial-gradient(
    120% 120% at 50% 0%,
    rgba(var(--color-ink-rgb, 8, 16, 27), 0) 40%,
    rgba(var(--color-ink-rgb, 8, 16, 27), 0.85) 100%
  );
}

/* Soundwave animations for ambient music widget */
@keyframes soundwave-pulse {
  0%, 100% {
    height: 4px;
  }
  50% {
    height: 14px;
  }
}

}

  animation-delay: 0.3s;
}

  animation-delay: 0.6s;
}
